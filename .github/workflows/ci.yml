name: CI

on:
  pull_request:
  push:
    branches:
      - "**"
    tags:
      - "techlab-v*.*.*"

permissions:
  contents: read

jobs:
  backend-check:
    name: Backend check
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Install backend dependencies
        working-directory: backend
        run: uv sync --all-groups --frozen --no-progress --no-install-project

      - name: Run Ruff
        working-directory: backend
        run: uv run ruff check app tests

      - name: Check Ruff formatting
        working-directory: backend
        run: uv run ruff format app tests --check

      - name: Run mypy
        working-directory: backend
        run: uv run mypy app tests

      - name: Run pytest
        working-directory: backend
        run: uv run pytest

  frontend-check:
    name: Frontend check
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.13"

      - name: Install frontend dependencies
        run: bun install --cwd frontend --frozen-lockfile

      - name: Run frontend lint
        run: bun run --cwd frontend lint

      - name: Build frontend
        run: bun run --cwd frontend build

  create-techlab-release:
    name: Create Techlab release
    runs-on: ubuntu-latest
    needs:
      - backend-check
      - frontend-check
    if: startsWith(github.ref, 'refs/tags/techlab-v')
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Extract release notes
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          if [[ ! "$tag" =~ ^techlab-v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Tag must match techlab-vX.Y.Z" >&2
            exit 1
          fi
          version="${tag#techlab-v}"
          awk -v version="${version}" '
            $0 == "## " version "-techlab" { capture=1; next }
            capture && /^## / { exit }
            capture { print }
          ' release-notes-techlab.md > release_notes.md
          test -s release_notes.md

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --title "Techlab release ${GITHUB_REF_NAME}" \
            --notes-file release_notes.md
